apiVersion: apps/v1
kind: Deployment

metadata:
  name: react-deployment
  namespace: react

spec:
  replicas: 2

  revisionHistoryLimit: 5

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1

  selector:
    matchLabels:
      app: react-app

  template:
    metadata:
      labels:
        app: react-app

    spec:
      serviceAccountName: react-sa

      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: environment
                    operator: In
                    values:
                      - prod

      tolerations:
        - key: "environment"
          operator: "Equal"
          value: "prod"
          effect: "NoSchedule"

      containers:
        - name: react-container

          image: sairam2107/react-app
          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          volumeMounts:
            - name: config-volume
              mountPath: /etc/config

            - name: secret-volume
              mountPath: /etc/secret
              readOnly: true

            - name: pvc-storage
              mountPath: /usr/share/nginx/html/data

          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5

          startupProbe:
            httpGet:
              path: /
              port: 8080
            failureThreshold: 30
            periodSeconds: 5

      volumes:
        - name: config-volume
          configMap:
            name: react-config

        - name: secret-volume
          secret:
            secretName: react-secret

        - name: pvc-storage
          persistentVolumeClaim:
            claimName: react-pvc
